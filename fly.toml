app = "free4talk-presence-bot"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  BOT_DATA_DIR = "/data"
  CORS_ORIGINS = "*"
  HOST = "0.0.0.0"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    grace_period = "45s"
    interval = "15s"
    timeout = "10s"
    method = "GET"
    path = "/healthz"

    [http_service.checks.headers]
      X-Forwarded-Proto = "https"

[[mounts]]
  source = "bot_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
